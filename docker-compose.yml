services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ccsyacht-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - DB_HOST=postgres
      - DB_DATABASE=${DB_DATABASE:-ccsyacht}
      - DB_USERNAME=${DB_USERNAME:-ccsyacht}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - ccsyacht-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx Web Server (named 'backend' for frontend access)
  backend:
    image: nginx:alpine
    container_name: ccsyacht-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ccsyacht-network
    depends_on:
      - app

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ccsyacht-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ccsyacht_central}
      POSTGRES_USER: ${DB_USERNAME:-ccsyacht}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ccsyacht-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ccsyacht-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ccsyacht}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Cache & Queue
  redis:
    image: redis:alpine
    container_name: ccsyacht-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ccsyacht-redis-data:/data
    networks:
      - ccsyacht-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Mailpit for local email testing
  mailpit:
    image: axllent/mailpit
    container_name: ccsyacht-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - ccsyacht-network

networks:
  ccsyacht-network:
    external: true

volumes:
  ccsyacht-postgres-data:
  ccsyacht-redis-data:
